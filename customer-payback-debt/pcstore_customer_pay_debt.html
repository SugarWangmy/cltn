<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>克丽缇娜店务通系统 - 客户详情</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        @font-face {
            font-family: 'PingFang SC';
            src: local('PingFang SC');
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .brand-pink {
            color: #F1A3B8;
        }

        .bg-brand-pink {
            background-color: #F1A3B8;
        }

        .border-brand-pink {
            border-color: #F1A3B8;
        }

        .brand-red {
            color: #F1A3B8;
        }

        .bg-brand-red {
            background-color: #F1A3B8;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* 表格样式优化 */
        .data-table th {
            font-weight: 500;
            color: #666;
            background-color: #fafafa;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table td {
            border-bottom: 1px solid #f0f0f0;
        }

        /* 自定义选择样式 */
        .option-box.active {
            border-color: #F1A3B8;
            color: #F1A3B8;
            background-color: #fdf7f8;
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden">
    <!-- 顶部导航栏 -->
    <nav class="h-14 bg-white border-bottom border-gray-100 flex items-center px-6 shadow-sm sticky top-0 z-10">
        <div class="flex items-center space-x-4">
            <iconify-icon class="text-xl text-gray-500 cursor-pointer" icon="mdi:arrow-left"></iconify-icon>
            <div class="flex items-center space-x-1">
                <span class="text-lg font-bold brand-pink tracking-widest uppercase">CHLITINA 克丽缇娜</span>
            </div>
            <div class="h-4 w-[1px] bg-gray-300 mx-2"></div>
            <div class="flex items-center space-x-2 text-sm text-gray-500">
                <span>客户列表</span>
                <iconify-icon class="text-lg" icon="mdi:chevron-right"></iconify-icon>
                <span class="text-gray-800">客户详情</span>
            </div>
        </div>
    </nav>
    <!-- 主体内容 -->
    <main class="max-w-[1440px] mx-auto p-6 flex gap-6">
        <!-- 左侧：客户信息名片 -->
        <div class="w-1/3 min-w-[380px]">
            <div class="bg-white rounded-lg overflow-hidden shadow-sm h-full flex flex-col items-center py-12 relative">
                <!-- 装饰背景 -->
                <div class="absolute top-0 left-0 w-full h-40 opacity-10"
                    style="background: linear-gradient(135deg, #F1A3B8 0%, #ffffff 100%);"></div>
                <!-- 客户头像 -->
                <div class="relative z-[1] w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-md mb-6">
                    <img alt="Customer Avatar" class="w-full h-full object-cover"
                        src="https://modao.cc/agent-py/media/generated_images/2026-04-16/7c0d400da1e84b2e951a9bd3b2a835ee.jpg" />
                    <div
                        class="absolute bottom-0 right-0 bg-yellow-400 p-1 rounded-full border-2 border-white flex items-center justify-center">
                        <iconify-icon class="text-white text-xs" icon="mdi:crown"></iconify-icon>
                    </div>
                </div>
                <!-- 会员等级 -->
                <div class="flex items-center space-x-2 mb-8 relative z-[1]">
                    <span class="bg-pink-100 brand-pink text-xs px-2 py-0.5 rounded-full flex items-center">
                        <iconify-icon class="mr-1" icon="mdi:account-star"></iconify-icon>
                        会员
                    </span>
                    <iconify-icon class="brand-pink" icon="mdi:diamond-stone"></iconify-icon>
                </div>
                <div class="text-center relative z-[1] mt-4">
                    <h2 class="text-3xl font-light brand-pink mb-2 tracking-widest">尊贵的会员</h2>
                    <p class="text-gray-400 text-sm mb-12">欢迎您登录</p>
                    <div class="mt-20">
                        <p class="text-2xl brand-pink font-bold tracking-[0.2em] opacity-80 uppercase">CHLITINA</p>
                        <p class="text-gray-400 text-sm mt-1 tracking-widest">店 务 通 系 统</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- 右侧：业务详情区域 -->
        <div class="w-2/3 space-y-6">
            <div class="bg-white rounded-lg shadow-sm">
                <!-- Tab 栏 -->
                <div class="flex border-b border-gray-100">
                    <button class="px-8 py-4 text-gray-500 hover:text-gray-700 font-medium">客户权益</button>
                    <button class="px-8 py-4 brand-pink border-b-2 border-brand-pink font-medium relative">
                        我的钱包
                    </button>
                    <button class="px-8 py-4 text-gray-500 hover:text-gray-700 font-medium">交易记录</button>
                    <button class="px-8 py-4 text-gray-500 hover:text-gray-700 font-medium">服务记录</button>
                </div>
                <!-- 钱包统计 -->
                <div class="p-8 flex items-center">
                    <div class="flex-1 border-r border-gray-100 flex items-center px-8">
                        <div class="w-12 h-12 rounded-lg bg-pink-50 flex items-center justify-center mr-4">
                            <iconify-icon class="text-2xl brand-pink" icon="mdi:wallet-outline"></iconify-icon>
                        </div>
                        <div>
                            <p class="text-gray-400 text-sm mb-1">钱包余额</p>
                            <p class="text-3xl font-semibold">1</p>
                        </div>
                    </div>
                    <div class="flex-1 flex items-center justify-between px-8">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-lg bg-gray-50 flex items-center justify-center mr-4">
                                <iconify-icon class="text-2xl text-gray-400" icon="mdi:cash-fast"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-gray-400 text-sm mb-1">欠款</p>
                                <p class="text-3xl font-semibold">578</p>
                            </div>
                        </div>
                        <button class="text-red-500 hover:text-red-600 text-sm flex items-center font-medium"
                            onclick="openModal()">
                            还欠款 <iconify-icon class="ml-1" icon="mdi:chevron-right"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>
            <!-- 账单明细 -->
            <div class="bg-white rounded-lg shadow-sm p-6 min-h-[400px]">
                <div class="flex items-center mb-6">
                    <div class="w-1 h-5 bg-brand-pink mr-3 rounded-full"></div>
                    <h3 class="text-lg font-bold">钱包账单明细</h3>
                </div>
                <table class="w-full data-table">
                    <thead>
                        <tr class="text-left">
                            <th class="py-4 px-4 font-normal">交易类型</th>
                            <th class="py-4 px-4 font-normal">订单号</th>
                            <th class="py-4 px-4 font-normal">支付方式</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-4 text-gray-600">充值</td>
                            <td class="py-4 px-4 text-gray-500 font-mono">2026041700050207326</td>
                            <td class="py-4 px-4 text-gray-600">现金</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-4 text-gray-600">消费</td>
                            <td class="py-4 px-4 text-gray-500 font-mono">2026041600041208912</td>
                            <td class="py-4 px-4 text-gray-600">余额</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-4 text-gray-600">充值</td>
                            <td class="py-4 px-4 text-gray-500 font-mono">2026032000021005543</td>
                            <td class="py-4 px-4 text-gray-600">微信支付</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- 还款弹窗 -->
    <div class="modal-overlay fixed inset-0 z-50 flex justify-end" id="repayModal">
        <!-- 侧边弹窗容器 -->
        <div class="w-[450px] bg-white h-full shadow-2xl flex flex-col animate-slide-in">
            <!-- 弹窗头部 -->
            <div class="h-14 flex items-center justify-between px-6 border-b border-gray-100">
                <iconify-icon class="text-xl text-gray-400 cursor-pointer hover:text-gray-600" icon="mdi:close"
                    onclick="closeModal()"></iconify-icon>
                <h2 class="text-lg font-medium text-gray-700">还款</h2>
                <div class="w-6"></div> <!-- 占位保持居中 -->
            </div>
            <!-- 弹窗主体 -->
            <div class="flex-1 overflow-y-auto p-6 space-y-8">
                <!-- 还款金额 -->
                <div>
                    <label class="block mb-4 text-gray-600">
                        <span class="text-red-500 mr-1">*</span>还款金额
                    </label>
                    <div class="relative">
                        <input
                            class="w-full h-12 px-4 border border-gray-200 rounded focus:border-brand-pink focus:ring-0 outline-none text-lg"
                            id="repayAmount" placeholder="请输入还款金额" type="number" />
                        <span class="absolute right-4 top-3 text-gray-500">元</span>
                    </div>
                    <p class="mt-2 text-sm text-gray-400">您的欠款金额: 578</p>
                </div>
                <!-- 美容师 -->
                <div>
                    <label class="block mb-4 text-gray-600">
                        <span class="text-red-500 mr-1">*</span>美容师
                    </label>
                    <div
                        class="w-full h-12 px-4 border border-gray-200 rounded flex items-center justify-between cursor-pointer group">
                        <div class="flex items-center space-x-2">
                            <span class="bg-gray-100 px-2 py-1 rounded text-sm text-gray-600 flex items-center">
                                roger <iconify-icon class="ml-1 text-gray-400" icon="mdi:close"></iconify-icon>
                            </span>
                        </div>
                        <iconify-icon class="text-gray-400" icon="mdi:chevron-down"></iconify-icon>
                    </div>
                </div>
                <!-- 支付方式 -->
                <div>
                    <label class="block mb-4 text-gray-600">
                        <span class="text-red-500 mr-1">*</span>支付方式
                    </label>
                    <div class="flex flex-wrap gap-2">
                        <button class="option-box px-4 py-2 border border-gray-200 rounded text-sm active"
                            onclick="selectPay(this)">现金</button>
                        <button class="option-box px-4 py-2 border border-gray-200 rounded text-sm"
                            onclick="selectPay(this)">支付宝</button>
                        <button class="option-box px-4 py-2 border border-gray-200 rounded text-sm"
                            onclick="selectPay(this)">微信</button>
                        <button class="option-box px-4 py-2 border border-gray-200 rounded text-sm"
                            onclick="selectPay(this)">银行卡POS</button>
                        <button class="option-box px-4 py-2 border border-gray-200 rounded text-sm"
                            onclick="selectPay(this)">线上支付</button>
                    </div>
                </div>
                <!-- 备注 -->
                <div>
                    <label class="block mb-4 text-gray-600">备注</label>
                    <div class="relative">
                        <textarea
                            class="w-full p-4 border border-gray-200 rounded focus:border-brand-pink outline-none resize-none"
                            id="remark" maxlength="200" oninput="updateWordCount(this)" placeholder="请输入"
                            rows="4"></textarea>
                        <span class="absolute bottom-3 right-3 text-xs text-gray-400"><span
                                id="wordCount">0</span>/200</span>
                    </div>
                </div>
            </div>
            <!-- 底部按钮 -->
            <div class="p-6 border-t border-gray-100 flex items-center space-x-3">
                <button class="flex-1 h-11 border border-gray-200 rounded text-gray-600 hover:bg-gray-50 font-medium"
                    onclick="closeModal()">取消</button>
                <button
                    class="flex-1 h-11 bg-brand-pink text-white rounded hover:opacity-90 font-medium shadow-lg shadow-pink-100"
                    onclick="submitRepay()">确定</button>
            </div>
        </div>
    </div>
    <script>
        // 弹窗控制
        function openModal() {
            const modal = document.getElementById('repayModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('repayModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 支付方式选择交互
        function selectPay(el) {
            document.querySelectorAll('.option-box').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        // 备注字数统计
        function updateWordCount(el) {
            document.getElementById('wordCount').innerText = el.value.length;
        }

        // 模拟提交
        function submitRepay() {
            const amount = document.getElementById('repayAmount').value;
            if (!amount) {
                alert('请输入还款金额');
                return;
            }
            alert('还款处理中，金额：' + amount + ' 元');
            closeModal();
        }

        // 初始弹窗状态逻辑 (演示目的可改为点击手动触发)
        // window.onload = openModal; 
    </script>
    <style>
        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</body>

</html>
