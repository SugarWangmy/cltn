<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>克丽缇娜 - 选购商品 (Pad端)</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        @font-face {
            font-family: 'PingFang SC';
            src: local('PingFang SC');
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .ipad-container {
            width: 1024px;
            height: 768px;
            background-color: #FDF8F9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 12px solid #1a1a1a;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #fbcfe8;
            border-radius: 10px;
        }
        .step-line {
            background-image: linear-gradient(to right, #ccc 50%, rgba(255, 255, 255, 0) 0%);
            background-position: bottom;
            background-size: 8px 1px;
            background-repeat: repeat-x;
        }
    </style>
</head>
<body>
<div class="ipad-container">
<!-- 1. 顶部状态栏 -->
<div class="h-8 bg-white flex justify-between items-center px-6 text-xs font-medium text-gray-700">
<div class="flex items-center space-x-2">
<span>13:15</span>
<span>2026年4月16日 周四</span>
</div>
<div class="flex items-center space-x-2">
<iconify-icon class="text-base" icon="mdi:wifi"></iconify-icon>
<iconify-icon class="text-base" icon="mdi:bluetooth"></iconify-icon>
<div class="flex items-center">
<span class="mr-1">81%</span>
<iconify-icon class="text-lg" icon="mdi:battery-80"></iconify-icon>
</div>
</div>
</div>
<!-- 2. 品牌与用户信息栏 -->
<div class="h-14 bg-white border-b border-gray-100 flex justify-between items-center px-6">
<div class="flex items-center">
<iconify-icon class="text-gray-400 text-2xl mr-2" icon="mdi:chevron-left"></iconify-icon>
<div class="flex items-center space-x-1">
<span class="text-pink-600 font-bold tracking-widest text-lg">CHLITINA</span>
<span class="text-pink-600 font-light text-lg">克丽缇娜</span>
</div>
</div>
<div class="flex items-center space-x-6">
<div class="flex space-x-4 text-pink-300">
<iconify-icon class="text-xl" icon="mdi:bell-outline"></iconify-icon>
<iconify-icon class="text-xl" icon="mdi:home-outline"></iconify-icon>
<iconify-icon class="text-xl" icon="mdi:cart-outline"></iconify-icon>
</div>
<div class="flex items-center border-l pl-6 border-gray-200">
<img alt="User avatar" class="w-8 h-8 rounded-full bg-gray-100 mr-2" src="https://modao.cc/agent-py/media/generated_images/2026-04-16/f5284a3a19754b848f49139f6b2d8f48.jpg"/>
<div class="text-xs">
<div class="font-bold text-gray-800">roger</div>
<div class="text-gray-400">店总</div>
</div>
<div class="ml-4 flex items-center">
<span class="text-sm font-bold text-gray-800">测试店1</span>
<iconify-icon class="ml-1 text-gray-400" icon="mdi:chevron-down"></iconify-icon>
</div>
</div>
</div>
</div>
<!-- 3. 客户信息与步骤指引 -->
<div class="bg-[#FCF1F3] px-6 py-4">
<div class="flex justify-between items-center">
<div class="flex items-start space-x-3">
<img alt="Customer avatar" class="w-12 h-12 rounded-full bg-white p-1" src="https://modao.cc/agent-py/media/generated_images/2026-04-16/3c8a3eda4c1348a9a6c118679cc869e4.jpg"/>
<div>
<div class="text-pink-500 font-medium text-sm">付小姐 定制-春季</div>
<div class="text-[11px] text-pink-300 mt-1 flex space-x-3">
<span>居家产品：无折扣</span>
<span>护理产品：8.8折</span>
<span>次卡：无折扣</span>
</div>
</div>
</div>
<div class="flex items-center space-x-8">
<div class="flex items-center space-x-2">
<div class="w-3 h-3 rounded-full bg-pink-500 shadow-[0_0_0_4px_rgba(236,72,153,0.1)]"></div>
<span class="text-gray-700 font-medium text-sm">第 1 步，选购商品</span>
</div>
<div class="w-24 h-[1px] step-line"></div>
<div class="flex items-center space-x-2">
<div class="w-3 h-3 rounded-full bg-gray-300"></div>
<span class="text-gray-400 text-sm">第 2 步，确认商品</span>
</div>
</div>
</div>
</div>
<!-- 4. 搜索与主分类 -->
<div class="px-6 pt-6">
<div class="flex items-center space-x-4">
<div class="flex-1 relative">
<input class="w-[400px] h-10 px-4 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-pink-400" placeholder="输入商品名称" type="text"/>
<button class="absolute left-[400px] ml-4 h-10 px-8 bg-pink-500 text-white rounded-lg text-sm font-medium hover:bg-pink-600 transition-colors">
                        搜索
                    </button>
</div>
</div>
<div class="flex space-x-3 mt-6">
<button class="flex items-center space-x-2 px-6 py-2 bg-white border border-gray-200 rounded-t-xl text-gray-500 hover:text-pink-500 transition-colors">
<iconify-icon icon="mdi:package-variant-closed"></iconify-icon>
<span class="text-sm font-medium">居家产品</span>
</button>
<button class="flex items-center space-x-2 px-6 py-2 bg-white border border-gray-200 rounded-t-xl text-gray-500 hover:text-pink-500 transition-colors">
<iconify-icon icon="mdi:spa-outline"></iconify-icon>
<span class="text-sm font-medium">疗程服务</span>
</button>
<button class="flex items-center space-x-2 px-6 py-2 bg-white border-b-0 border-x border-t border-pink-200 rounded-t-xl text-pink-500 shadow-sm relative z-10">
<iconify-icon icon="mdi:card-account-details-outline"></iconify-icon>
<span class="text-sm font-bold">卡项</span>
<div class="absolute bottom-[-2px] left-0 right-0 h-[2px] bg-white"></div>
</button>
</div>
</div>
<!-- 5. 筛选与商品列表 -->
<div class="flex-1 bg-white mx-6 mb-20 rounded-b-xl border border-gray-100 flex flex-col overflow-hidden">
<div class="p-4 border-b border-gray-50 flex items-center space-x-6">
<span class="text-xs text-gray-400">分类筛选：</span>
<div class="flex space-x-3">
<button class="px-5 py-1 text-xs border border-pink-500 text-pink-500 rounded-full font-medium">全部</button>
<button class="px-5 py-1 text-xs border border-gray-200 text-gray-500 rounded-full hover:border-pink-200">次卡</button>
</div>
</div>
<!-- 商品网格 -->
<div class="flex-1 overflow-y-auto p-4 grid grid-cols-4 gap-4 custom-scrollbar" id="productGrid">
<!-- 商品卡片由 JS 生成 -->
</div>
</div>
<!-- 6. 底部已选操作区 -->
<div class="absolute bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 px-6 flex justify-between items-center z-20">
<div class="flex items-center space-x-2 overflow-x-auto max-w-[70%]">
<span class="text-sm font-bold text-gray-800 shrink-0">已选</span>
<div class="flex space-x-2" id="selectedContainer">
<!-- 已选标签 -->
</div>
</div>
<button class="h-12 px-10 bg-pink-500 text-white rounded-lg font-bold shadow-lg shadow-pink-100 hover:bg-pink-600 active:scale-95 transition-all">
                下一步，确认商品
            </button>
</div>
</div>
<script>
        const products = [
            { id: 1, name: "周年卡", type: "通卡", price: 9800.00, originalPrice: 9800 },
            { id: 2, name: "38节日卡", type: "有限次卡", price: 3999.00, originalPrice: 3999 },
            { id: 3, name: "1680水妍润泽通卡", type: "通卡", price: 1680.00, originalPrice: 1680 },
            { id: 4, name: "东山深层补水任意卡", type: "通卡", price: 3333.00, originalPrice: 3333 },
            { id: 5, name: "东山深层补水月卡", type: "不限次卡", price: 2222.00, originalPrice: 2222 },
            { id: 6, name: "东山深层补水10次卡", type: "有限次卡", price: 1111.00, originalPrice: 1111 },
            { id: 7, name: "基础油肩颈20次疗程", type: "通卡", price: 3000.00, originalPrice: 3000 },
            { id: 8, name: "基础油肩颈10次疗程", type: "有限次卡", price: 1980.00, originalPrice: 1980 },
            { id: 9, name: "胶原养护", type: "有限次卡", price: 1980.00, originalPrice: 1980 },
            { id: 10, name: "洗脸10次卡", type: "有限次卡", price: 5000.00, originalPrice: 5000 },
            { id: 11, name: "志志芯芯", type: "通卡", price: 900.00, originalPrice: 900 },
            { id: 12, name: "小绿", type: "有限次卡", price: 590.00, originalPrice: 590 },
            { id: 13, name: "时光宝盒", type: "有限次卡", price: 2888.00, originalPrice: 2888 },
            { id: 14, name: "晶钻", type: "有限次卡", price: 1580.00, originalPrice: 1580 },
            { id: 15, name: "润肤修复卡", type: "有限次卡", price: 1200.00, originalPrice: 1200 },
            { id: 16, name: "店庆卡", type: "有限次卡", price: 1999.00, originalPrice: 1999 }
        ];

        let selection = {};

        // 初始化模拟一些默认选择 (按图示：东山面膜、气血、周年卡)
        // 注意：原图中提到东山面膜和气血，但不在商品列表内，这里模拟业务逻辑
        const initialSelections = ["东山面膜", "气血"];
        
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const count = selection[p.id] || 0;
                return `
                    <div onclick="toggleProduct(${p.id})" class="relative bg-white border ${count > 0 ? 'border-pink-300 shadow-sm' : 'border-gray-100'} rounded-lg p-3 flex cursor-pointer hover:border-pink-200 transition-all">
                        ${count > 0 ? `<div class="absolute top-[-8px] right-[-8px] w-5 h-5 bg-red-500 text-white text-[10px] flex items-center justify-center rounded-full border border-white shadow-sm z-10 font-bold">${count}</div>` : ''}
                        
                        <div class="w-12 h-full flex flex-col justify-center items-center opacity-30">
                            <div class="text-[8px] text-pink-500 font-bold scale-75">CHLITINA</div>
                            <div class="text-[6px] text-pink-400 scale-75">克丽缇娜</div>
                        </div>

                        <div class="flex-1 ml-2 border-l border-gray-50 pl-2">
                            <div class="flex justify-between items-start">
                                <span class="text-sm font-bold text-gray-800 truncate">${p.name}</span>
                                <iconify-icon icon="mdi:chevron-right" class="text-pink-300 text-sm"></iconify-icon>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-1">${p.type}</div>
                            
                            <div class="mt-4 flex flex-col items-end">
                                <div class="text-[8px] text-gray-300 flex space-x-1">
                                    <span>原价</span>
                                    <span>${p.originalPrice}</span>
                                </div>
                                <div class="text-xs font-bold text-gray-800">
                                    ${p.price.toFixed(2)} 元
                                </div>
                            </div>
                        </div>
                        
                        ${count > 0 ? `
                            <div class="absolute bottom-2 right-2">
                                <iconify-icon icon="mdi:check-bold" class="text-pink-500 text-sm"></iconify-icon>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            updateFooter();
        }

        function toggleProduct(id) {
            if (selection[id]) {
                selection[id] += 1;
            } else {
                selection[id] = 1;
            }
            renderProducts();
        }

        function removeProduct(id) {
            delete selection[id];
            renderProducts();
        }

        function updateFooter() {
            const container = document.getElementById('selectedContainer');
            // 合并初始模拟数据和当前选择
            let html = initialSelections.map(name => `
                <div class="flex items-center bg-pink-50 px-3 py-1 rounded text-pink-500 text-xs border border-pink-100">
                    <span>${name}</span>
                    <iconify-icon icon="mdi:close" class="ml-1 cursor-pointer hover:text-pink-700"></iconify-icon>
                </div>
            `).join('');

            Object.keys(selection).forEach(id => {
                const p = products.find(prod => prod.id == id);
                if(p) {
                    html += `
                        <div class="flex items-center bg-pink-50 px-3 py-1 rounded text-pink-500 text-xs border border-pink-100">
                            <span>${p.name}</span>
                            <iconify-icon icon="mdi:close" onclick="event.stopPropagation(); removeProduct(${id})" class="ml-1 cursor-pointer hover:text-pink-700"></iconify-icon>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
        }

        // 页面初始化
        renderProducts();

    </script>
</body>
</html>
