<style>
        @font-face {
            font-family: 'PingFang SC';
            src: local('PingFang SC');
        }
        body {
            font-family: 'PingFang SC', sans-serif;
            background-color: #F5F5F5;
        }
        .chlitina-pink { color: #E884A4; }
        .bg-chlitina-pink { background-color: #E884A4; }
        .border-chlitina-pink { border-color: #E884A4; }
        .bg-chlitina-light { background-color: #FFF0F6; }
        
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .sticky-steps {
            position: sticky;
            top: 80px; /* Height of member info bar */
            z-index: 40;
        }
        
        .section-anchor {
            scroll-margin-top: 140px; /* Offset for sticky headers */
        }
        
        .step-item.active {
            color: #E884A4;
            border-bottom: 3px solid #E884A4;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        .benefit-card:hover { border-color: #E884A4; transform: translateY(-2px); transition: all 0.2s; }
        
        .modal {
            background-color: rgba(0,0,0,0.5);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;

<button class="px-12 py-3 bg-chlitina-pink text-white rounded-xl font-bold shadow-lg shadow-pink-200 hover:bg-pink-500 hover:-translate-y-0.5 transition-all flex items-center space-x-2" onclick="submitOrder()">

<script>
        // 模拟数据
        const members = [
            { id: '1001', name: '张美玲', phone: '138****8888', level: '会员', balance: 5280, consumption: 4, customerType: '白金会员' },
            { id: '1002', name: '李晓华', phone: '139****1234', level: '会员', balance: 1200, consumption: 2, customerType: '尊享会员' },
            { id: '1003', name: '王丽坤', phone: '155****0099', level: '会员', balance: 12800, consumption: 7, customerType: '钻石会员' },
            { id: '1004', name: '周冬雨', phone: '131****5566', level: '会员', balance: 500, consumption: 1, customerType: '普通会员' },
            { id: '1005', name: '赵丽颖', phone: '135****7788', level: '新客', balance: 0, consumption: 0, customerType: '新客' },
            { id: '1006', name: '杨幂', phone: '136****9988', level: '体验客', balance: 0, consumption: 0, customerType: '体验客' }
        ];

        const goods = [
            // 居家产品
            { id: 'G02', name: '玻尿酸补水面膜', type: '居家产品', category: 'home', price: 198, spec: '5片/盒' },
            { id: 'G03', name: '法尔曼幸福面膜', type: '居家产品', category: 'home', price: 1880, spec: '50ml' },
            { id: 'G06', name: '克丽缇娜净颜乳', type: '居家产品', category: 'home', price: 320, spec: '120ml' },
            { id: 'G07', name: '克丽缇娜保湿精华液', type: '居家产品', category: 'home', price: 480, spec: '30ml' },
            { id: 'G08', name: '克丽缇娜防晒霜', type: '居家产品', category: 'home', price: 280, spec: '50ml' },
            
            // 单次护理
            { id: 'G01', name: '面部深层清洁护理', type: '单次护理', category: 'single', price: 298, spec: '60分钟' },
            { id: 'G04', name: '眼部舒缓经络SPA', type: '单次护理', category: 'single', price: 388, spec: '45分钟' },
            { id: 'G05', name: '全身精油淋巴排毒', type: '单次护理', category: 'single', price: 598, spec: '90分钟' },
            { id: 'G09', name: '肩颈舒缓按摩', type: '单次护理', category: 'single', price: 258, spec: '45分钟' },
            { id: 'G10', name: '面部美白护理', type: '单次护理', category: 'single', price: 368, spec: '60分钟' },
            
            // 卡项
            { id: 'G11', name: '月度护理卡', type: '卡项', category: 'card', price: 1980, spec: '4次' },
            { id: 'G12', name: '季度护理卡', type: '卡项', category: 'card', price: 5280, spec: '12次' },
            { id: 'G13', name: '年度护理卡', type: '卡项', category: 'card', price: 18800, spec: '48次' },
            { id: 'G14', name: '产品折扣卡', type: '卡项', category: 'card', price: 999, spec: '全年8折' }
        ];

        let currentMember = null;
        let selectedMemberTemp = null;
        let cart = [];

        // 初始化
        window.onload = () => {
            renderGoods();
            setupScrollSpy();
            hideConsumeBenefits();
        };

        // 渲染商品
        function renderGoods() {
            // 渲染居家产品
            const homeProductsGrid = document.getElementById('home-products-grid');
            homeProductsGrid.innerHTML = goods.filter(item => item.category === 'home').map(item => `
                <div class="bg-white border border-gray-100 rounded-xl p-4 hover:shadow-md transition-all cursor-pointer group" onclick="addToCart('${item.id}')">
                    <div class="w-full h-32 bg-gray-50 rounded-lg mb-3 flex items-center justify-center text-gray-300">
                        <iconify-icon class="text-4xl" icon="ri:shopping-bag-3-line"></iconify-icon>
                    </div>
                    <h4 class="font-bold text-gray-800 text-sm truncate">${item.name}</h4>
                    <p class="text-[10px] text-gray-400 mt-1">${item.spec}</p>
                    <div class="mt-3 flex items-center justify-between">
                        <span class="chlitina-pink font-bold">¥${item.price}</span>
                        <div class="w-7 h-7 bg-chlitina-light rounded-full flex items-center justify-center text-chlitina-pink opacity-0 group-hover:opacity-100 transition-opacity">
                            <iconify-icon icon="ri:add-line"></iconify-icon>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 渲染单次护理
            const singleCareGrid = document.getElementById('single-care-grid');

        // 滚动监听
        function setupScrollSpy() {
            const main = document.getElementById('main-content');
            const sections = document.querySelectorAll('.section-anchor');
            const stepItems = document.querySelectorAll('.step-item');

            main.addEventListener('scroll', () => {
                let current = "";
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (main.scrollTop >= sectionTop - 150) {
                        let sectionId = section.getAttribute('id');
                        // 处理消耗权益区域的特殊情况
                        if (sectionId === 'consume-benefits-section') {
                            sectionId = 'consume-benefits';
                        }
                        current = sectionId;
                    }
                });

                stepItems.forEach(item => {
                    item.classList.remove('active');
                    item.classList.add('text-gray-500');
                    if (item.getAttribute('data-section') === current) {
                        item.classList.add('active');
                        item.classList.remove('text-gray-500');
                    }
                });
            });
        }

        function scrollToSection(id) {
            // 处理消耗权益区域的特殊情况
            if (id === 'consume-benefits') {
                id = 'consume-benefits-section';
            }
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 购物车功能
        function addToCart(id) {
            const item = goods.find(g => g.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.count++;
            } else {
                cart.push({ ...item, count: 1, discount: 0, technician: '未分配' });
            }
            renderCart();
        }

        function addBenefit(name, price) {
            cart.push({ id: 'B' + Date.now(), name: name, type: '权益核销', price: price, count: 1, discount: 0, technician: '王芳' });
            renderCart();
        }

        function renderCart() {
            const tbody = document.getElementById('cart-tbody');
            const empty = document.getElementById('cart-empty');
            
            if (cart.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                updateTotals(0, 0);
                return;
            }
            
            // 按照商品类型和名称排序
            const sortedCart = [...cart].sort((a, b) => {
                // 类型排序顺序：服务 > 产品 > 其他
                const typeOrder = { service: 0, product: 1 };
                const typeA = typeOrder[a.type] !== undefined ? typeOrder[a.type] : 2;
                const typeB = typeOrder[b.type] !== undefined ? typeOrder[b.type] : 2;
                
                if (typeA !== typeB) {
                    return typeA - typeB;
                }
                
                // 同一类型内按商品名称排序
                return a.name.localeCompare(b.name);
            });
            
            empty.classList.add('hidden');
            // 判断是否为散客开单（未选择会员）
            const isWalkin = !currentMember;
            
            tbody.innerHTML = sortedCart.map((item, index) => {
                // 计算应付金额
                const retailPrice = item.price;
                const deduction = item.deduction || 0;
                const isGift = item.isGift || false;
                const payable = isGift ? 0 : (retailPrice - deduction);
                
                return `
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td colspan="7" class="px-6 py-4">
                            <div class="bg-[#F8F5F5] border border-gray-100 rounded-xl py-8 px-4">
                                <!-- 设为赠送服务 -->
                                <div class="flex items-center space-x-2 mb-2">
                                    <input type="checkbox" ${isGift ? 'checked' : ''} onchange="toggleGift(${index})" class="w-4 h-4 text-chlitina-pink">
                                    <label class="text-xs text-gray-500">设为赠送服务</label>
                                </div>
                                <!-- 第一行：商品名称、商品类型、零售价、数量、抵扣、应付、删除操作 -->
                                <div class="flex flex-wrap items-center justify-between mb-4 gap-4">
                                    <div class="flex items-center space-x-4">
                                        <div>
                                            <h4 class="font-bold text-gray-800">${item.name}</h4>
                                        </div>
                                        <span class="text-[10px] ${item.type === 'service' ? 'bg-blue-50 text-blue-600' : item.type === 'product' ? 'bg-orange-50 text-orange-600' : 'bg-pink-50 text-pink-600'} px-2 py-0.5 rounded">
                                            ${item.type === 'service' ? '服务' : item.type === 'product' ? '产品' : item.type}
                                        </span>
                                    </div>
                                    <div class="flex items-center space-x-4">
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs text-gray-500">数量:</span>
                                            <div class="flex items-center space-x-1">
                                                <button onclick="updateCount(${index}, -1)" class="w-6 h-6 border rounded-md flex items-center justify-center hover:bg-gray-100 text-xs">-</button>
                                                <input type="text" value="${item.count}" onchange="updateCountInput(${index}, this.value)" class="w-8 text-center text-sm border rounded-md">
                                                <button onclick="updateCount(${index}, 1)" class="w-6 h-6 border rounded-md flex items-center justify-center hover:bg-gray-100 text-xs">+</button>
                                            </div>
                                        </div>
                                        <div class="text-sm">
                                            <span class="text-gray-500">零售价</span>
                                            <span class="ml-1">¥${retailPrice.toLocaleString()}</span>
                                        </div>
                                        <div class="text-sm">
                                            <span class="text-gray-500">抵扣</span>
                                            <span class="ml-1">¥${deduction.toLocaleString()}</span>
                                        </div>
                                        <div class="text-sm">
                                            <span class="text-gray-500">应付</span>
                                            <span class="ml-1 font-bold text-base" style="color: #E884A4">¥${payable.toLocaleString()}</span>
                                        </div>
                                        <button onclick="removeFromCart(${index})" class="hover:text-red-500 transition-colors">
                                            <iconify-icon class="text-lg" style="color: #E884A4" icon="ri:delete-bin-line"></iconify-icon>
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- 第二行：选择美容师、选择卡项模块 -->
                                <div class="flex flex-wrap items-start gap-4">
                                    <div class="flex-1">
                                        <div class="flex items-center space-x-4 mb-1">
                                            <div class="flex-1">
                                                <label class="block text-xs text-gray-500 mb-1">美容师</label>
                                                <select onchange="updateTechnician(${index}, this.value)" class="w-full text-xs border border-gray-200 rounded-md p-2 focus:ring-2 focus:ring-chlitina-pink">
                                                    <option value="">请选择美容师</option>
                                                    <option value="王芳" ${item.technician === '王芳' ? 'selected' : ''}>王芳</option>
                                                    <option value="李燕" ${item.technician === '李燕' ? 'selected' : ''}>李燕</option>
                                                    <option value="张丽" ${item.technician === '张丽' ? 'selected' : ''}>张丽</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">卡项</label>
                                        ${isWalkin ? `
                                        <select disabled class="w-full text-xs border border-gray-200 rounded-md p-2 bg-gray-100 text-gray-400">
                                            <option value="">暂无可用卡项</option>
                                        </select>
                                        ` : `
                                        <select onchange="updateCard(${index}, this.value)" class="w-full text-xs border border-gray-200 rounded-md p-2 focus:ring-2 focus:ring-chlitina-pink">
                                            <option value="">请选择卡项</option>
                                            <option value="尊享金额卡" ${item.card === '尊享金额卡' ? 'selected' : ''}>尊享金额卡</option>
                                            <option value="金额卡" ${item.card === '金额卡' ? 'selected' : ''}>金额卡</option>
                                        </select>
                                        ${item.card ? `
                                        <div class="text-[10px] text-gray-400 mt-1">
                                            抵扣后余额: 0.00
                                            <br>
                                            居家产品 7.0折 | 服务疗程 7.0折 | 次卡 7.0折
                                        </div>
                                        ` : ''}
                                        `}
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">折后价</label>
                                        <input type="text" value="${(retailPrice - deduction).toLocaleString()}" onchange="updateDiscount(${index}, this.value)" class="w-full text-xs border border-gray-200 rounded-md p-2 focus:ring-2 focus:ring-chlitina-pink">
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            calculateTotal();
        }

        function updateCount(index, delta) {
            cart[index].count += delta;
            if (cart[index].count < 1) cart.splice(index, 1);
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function toggleGift(index) {
            cart[index].isGift = !cart[index].isGift;
            renderCart();
        }

        function updateTechnician(index, technician) {
            cart[index].technician = technician;
        }

        function updateCard(index, card) {
            cart[index].card = card;
            // 这里可以根据选择的卡项更新抵扣金额
            if (card) {
                cart[index].deduction = cart[index].price * 0.3; // 示例：抵扣30%
            } else {
                cart[index].deduction = 0;
            }
            renderCart();
        }

        function updateDiscount(index, discount) {
            cart[index].discount = parseFloat(discount) || 0;
        }

        function updateCountInput(index, value) {
            const count = parseInt(value) || 1;
            if (count >= 1) {
                cart[index].count = count;
                renderCart();
            }
        }

        function calculateTotal() {
            const itemsTotal = cart.reduce((sum, item) => {
                const isGift = item.isGift || false;
                const price = isGift ? 0 : item.price;
                return sum + (price * item.count);
            }, 0);
            const orderDiscount = parseFloat(document.getElementById('order-discount').value) || 0;
            const finalPayable = Math.max(0, itemsTotal - orderDiscount);
            const totalCount = cart.reduce((sum, item) => sum + item.count, 0);
            
            updateTotals(totalCount, finalPayable);
        }

        function updateTotals(count, amount) {
            document.getElementById('total-count').innerText = count;
            document.getElementById('payable-amount').innerText = `¥ ${amount.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function submitOrder() {
            if (cart.length === 0) {
                alert('请先选择商品或权益');
                return;
            }
            window.location.href = 'success.html';
        }

        function pendOrder() {
            alert('订单已挂单，可在挂单列表中查看');
        }

        function searchMembers() {
            const q = document.getElementById('member-search-input').value.toLowerCase();
            const filtered = members.filter(m => m.name.includes(q) || m.phone.includes(q));
            renderMemberList(filtered);
        }
