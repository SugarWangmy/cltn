<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>支付订单 - 移动支付</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: #F7F8FA;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 8px solid #333;
        }

        .content-scroll {
            height: calc(812px - 160px);
            overflow-y: auto;
            padding-bottom: 60px;
        }

        .content-scroll::-webkit-scrollbar {
            display: none;
        }

        .switch-checkbox:checked+.switch-label {
            background-color: #F1A3B8;
        }

        .switch-checkbox:checked+.switch-label .switch-dot {
            transform: translateX(20px);
        }

        .brand-text {
            color: #F1A3B8;
        }

        .brand-bg {
            background-color: #F1A3B8;
        }

        .brand-border {
            border-color: #F1A3B8;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <!-- 状态栏 -->
        <div class="flex justify-between items-center px-8 pt-4 pb-2 text-xs font-semibold">
            <span>09:41</span>
            <div class="flex gap-1 items-center">
                <iconify-icon icon="mdi:signal-cellular-3"></iconify-icon>
                <iconify-icon icon="mdi:wifi"></iconify-icon>
                <iconify-icon icon="mdi:battery"></iconify-icon>
            </div>
        </div>
        <!-- 导航栏 -->
        <div class="flex items-center px-4 py-3 bg-white">
            <a class="p-1" href="#">
                <iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon>
            </a>
            <h1 class="flex-1 text-center text-lg font-bold pr-8">支付订单</h1>
        </div>
        <div class="content-scroll">
            <!-- 支付金额展示 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex flex-col items-center justify-center text-center">
                    <span class="text-gray-500 text-sm mb-2">支付金额</span>
                    <span class="text-3xl font-black text-gray-800 mb-2" id="finalTotalDisplay">¥ 128.00</span>
                    <span class="text-xs text-gray-400" id="totalLabel">本单应付 + 归还欠款</span>
                </div>
            </div>
            <!-- 金额明细卡片 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>商品金额</span>
                    <span class="text-gray-800 font-medium">¥ 158.00</span>
                </div>
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>折后金额</span>
                    <span class="text-gray-800 font-medium">¥ 128.00</span>
                </div>
                <div class="flex justify-between mb-3 text-gray-500 text-sm">
                    <span>抵扣金额</span>
                    <span class="text-red-400 font-medium">- ¥ 0.00</span>
                </div>
                <div class="border-t border-dashed border-gray-100 my-4"></div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-800 font-bold">本单应付</span>
                    <span class="text-xl font-bold brand-text">¥ 128.00</span>
                </div>
            </div>
            <!-- 历史欠款功能区 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl p-5 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2">
                        <iconify-icon class="text-xl brand-text" icon="mdi:history"></iconify-icon>
                        <span class="font-bold text-gray-800">历史欠款</span>
                    </div>
                    <span class="text-sm font-medium text-gray-500">¥ 50.00</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                    <span class="font-bold text-gray-800">归还历史欠款</span>
                    <div
                        class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
                        <input
                            class="switch-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-transparent appearance-none cursor-pointer z-10"
                            id="debtToggle" type="checkbox" />
                        <label
                            class="switch-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-200"
                            for="debtToggle"></label>
                        <span
                            class="switch-dot absolute top-0 left-0 w-6 h-6 bg-white rounded-full transition-transform duration-200 pointer-events-none shadow-sm"></span>
                    </div>
                </div>
                <div class="hidden mt-4 pt-4 border-t border-gray-50" id="debtInputArea">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-medium">¥</span>
                        <input
                            class="w-full bg-gray-50 rounded-xl py-3 pl-8 pr-4 text-lg font-bold brand-text focus:outline-none focus:ring-1 brand-border"
                            id="debtAmount" type="number" value="50.00" />
                    </div>
                    <p class="text-[11px] text-gray-400 mt-2">* 默认填充全部欠款，支持按需修改</p>
                </div>
            </div>
            <!-- 支付方式列表 -->
            <div class="mt-6 px-4">
                <h2 class="text-sm font-bold text-gray-500 mb-3 px-1">支付方式</h2>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
                    <!-- 微信 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl" icon="logos:wechat-pay"></iconify-icon>
                            <span class="font-medium text-gray-800">微信支付</span>
                        </div>
                        <input checked="" class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio"
                            value="wechat" />
                    </label>
                    <!-- 支付宝 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl" icon="logos:alipay"></iconify-icon>
                            <span class="font-medium text-gray-800">支付宝</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="alipay" />
                    </label>
                    <!-- 现金 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl text-green-500" icon="mdi:cash-multiple"></iconify-icon>
                            <span class="font-medium text-gray-800">现金支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="cash" />
                    </label>
                    <!-- 银联 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-xl" icon="logos:unionpay"></iconify-icon>
                            <span class="font-medium text-gray-800">银联卡支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="union" />
                    </label>
                    <!-- 美团/点评 -->
                    <label
                        class="flex items-center justify-between p-4 border-b border-gray-50 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-2xl text-yellow-400" icon="simple-icons:meituan"></iconify-icon>
                            <span class="font-medium text-gray-800">美团/大众点评</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="meituan" />
                    </label>
                    <!-- 抖音 -->
                    <label class="flex items-center justify-between p-4 active:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <iconify-icon class="text-xl" icon="logos:tiktok-icon"></iconify-icon>
                            <span class="font-medium text-gray-800">抖音支付</span>
                        </div>
                        <input class="w-5 h-5 accent-[#F1A3B8]" name="pay_method" type="radio" value="tiktok" />
                    </label>
                </div>
            </div>
        </div>
        <!-- 底部操作栏 -->
        <div
            class="absolute bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] border-t border-gray-100 rounded-t-[32px]">
            <button
                class="w-full py-4 brand-bg text-white rounded-2xl font-bold text-lg shadow-lg shadow-pink-200 active:scale-[0.98] transition-transform"
                onclick="handlePay()">
                确认支付
            </button>
        </div>
    </div>
    <script>
        const baseAmount = 128.00;
        const debtToggle = document.getElementById('debtToggle');
        const debtInputArea = document.getElementById('debtInputArea');
        const debtAmountInput = document.getElementById('debtAmount');
        const finalTotalDisplay = document.getElementById('finalTotalDisplay');
        const totalLabel = document.getElementById('totalLabel');
        const btnAmount = document.getElementById('btnAmount');

        function updateCalculations() {
            let currentDebt = 0;
            if (debtToggle.checked) {
                currentDebt = parseFloat(debtAmountInput.value) || 0;
                debtInputArea.classList.remove('hidden');
                totalLabel.classList.remove('hidden');
            } else {
                debtInputArea.classList.add('hidden');
                totalLabel.classList.add('hidden');
            }

            const total = baseAmount + currentDebt;
            const formattedTotal = total.toFixed(2);

            finalTotalDisplay.innerText = `¥ ${formattedTotal}`;
            btnAmount.innerText = formattedTotal;
        }

        debtToggle.addEventListener('change', updateCalculations);
        debtAmountInput.addEventListener('input', updateCalculations);

        function handlePay() {
            // 跳转到成功页
            window.location.href = 'success.html';
        }

        // 初始化标注显示状态
        totalLabel.classList.add('hidden');
        // 初始化计算
        updateCalculations();
    </script>
</body>

</html>
