<!DOCTYPE html>

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="text-gray-800">
    <div class="page-container relative">
        <!-- 顶部导航 -->
        <header class="flex items-center justify-between px-4 py-4 border-b border-gray-100">
            <button class="p-2 hover:bg-gray-50 rounded-full transition-colors">

            </button>
            <h1 class="text-lg font-bold">支付确认</h1>
            <div class="w-10"></div>
        </header>
        <!-- 主要内容区域 -->
        <main class="flex-grow px-4 py-6 space-y-6 pb-48 overflow-y-auto" style="padding-bottom: 14rem;">
            <!-- 基础支付明细 -->

                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-500">折后金额</span>
                    <span class="font-medium text-gray-700" id="display-discounted-amount">¥512.00</span>
                </div>
                <div class="flex justify-between items-center text-sm border-t border-gray-100 pt-3">
                    <span class="text-gray-500 font-medium">抵扣金额</span>
                    <span class="font-medium text-gray-700" id="display-total-deduction">-¥45.00</span>
                </div>
                <!-- 抵扣明细列表区域 -->
                <div class="mt-1 pb-1" id="deduction-details-container">
                    <!-- 动态渲染抵扣明细列表 -->
                </div>
                <div class="flex justify-between items-center border-t border-gray-100 pt-3">
                    <span class="text-sm font-bold text-gray-900">应付金额</span>
                    <span class="text-lg font-black brand-color" id="display-base-payable">¥467.00</span>
                </div>
            </section>
            <!-- 历史欠款 -->
            <!-- <section class="bg-amber-50/40 border border-amber-100 rounded-2xl p-5 space-y-4">
                <div class="flex items-center justify-between">

                    </label>
                    <div class="hidden animate-in fade-in slide-in-from-top-2 duration-300" id="repay-input-container">
                        <div
                            class="flex items-center justify-between bg-white border border-amber-200 rounded-xl px-4 py-3">

            <!-- 支付方式 (多选/横向) -->
            <section class="space-y-3">
                <div class="flex items-center gap-2 px-1">
                    <iconify-icon class="text-gray-400 text-lg" icon="solar:wallet-money-bold-duotone"></iconify-icon>
                    <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">选择支付方式</h2>
                </div>
                <div class="grid grid-cols-4 gap-2" id="payment-methods-grid">
                    <!-- 现金 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('cash', this)">
                        <span class="text-xs font-medium">现金支付</span>
                    </div>
                    <!-- 微信 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('wechat', this)">
                        <span class="text-xs font-medium">微信支付</span>
                    </div>
                    <!-- 支付宝 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('alipay', this)">
                        <span class="text-xs font-medium">支付宝</span>
                    </div>
                    <!-- 银行卡POS -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('pos', this)">
                        <span class="text-xs font-medium">银行卡POS</span>
                    </div>
                    <!-- 银行卡转账 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('transaction', this)">
                        <span class="text-xs font-medium">银行卡转账</span>
                    </div>
                    <!-- 线上支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('merchant', this)">
                        <span class="text-xs font-medium">线上支付</span>
                    </div>
                    <!-- 美团/点评 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('third_party', this)">
                        <span class="text-xs font-medium">美团/点评</span>
                    </div>
                    <!-- 抖音支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('douyin', this)">
                        <span class="text-xs font-medium">抖音支付</span>
                    </div>
                    <!-- 余额 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('balance', this)">
                        <span class="text-xs font-medium">钱包</span>
                    </div>
                    <!-- 部门结算 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('store_settlement', this)">
                        <span class="text-xs font-medium">部门结算</span>
                    </div>
                    <!-- 云店支付 -->
                    <div class="payment-item flex items-center justify-center p-3 border border-gray-100 rounded-xl cursor-pointer hover:border-pink-200 transition-all bg-white shadow-sm"
                        onclick="togglePayment('cloud', this)">
                        <span class="text-xs font-medium">云店支付</span>
                    </div>
                </div>
                <p class="text-[10px] text-gray-400 px-1 mt-1" id="selected-methods-tip">当前已选: 无</p>
            </section>
            <!-- 支付金额分配 (新添加) -->
            <section class="space-y-3 hidden" id="allocation-section">
                <div class="flex items-center gap-2 px-1">
                    <iconify-icon class="brand-color text-lg" icon="solar:bill-check-bold-duotone"></iconify-icon>
                    <h2 class="text-sm font-bold text-gray-600 uppercase tracking-wider">支付金额分配</h2>
                </div>
                <div class="space-y-2" id="method-inputs-container">
                    <!-- 动态生成的金额输入框将放置在这里 -->
                </div>
                <p class="text-[10px] text-red-500 px-1 hidden" id="allocation-error">实付总额不能超过应付总额！</p>
            </section>
            <!-- 本次新产生的欠款 -->
            <section class="bg-red-50/40 border border-red-100 rounded-2xl p-4 flex justify-between items-center"
                id="new-arrears-section">
                <div class="flex items-center gap-2">
                    <iconify-icon class="text-red-400 text-xl" icon="solar:danger-bold-duotone"></iconify-icon>
                    <div>
                        <p class="text-sm font-bold text-gray-700">本次新产生欠款</p>
                        <p class="text-[10px] text-gray-400">总支付额 - 实付金额</p>
                    </div>
                </div>
                <span class="text-red-500 font-black" id="new-arrears-amount">¥0.00</span>
            </section>
        </main>
        <!-- 底部操作栏 -->
        <footer
            class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-8 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-20">
            <div class="flex items-center justify-between mb-4">
                <div class="hidden">
                    <p class="text-xs text-gray-400 mb-1">总支付金额 (应付+归还)</p>
                    <p class="text-sm font-bold text-gray-700" id="total-payable-display">¥467.00</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400 mb-1">实付金额</p>
                    <div class="flex items-baseline justify-end gap-1">
                        <span class="brand-color text-sm font-bold">¥</span>
                        <input
                            style="color: #F1A3B8;"
                            class="brand-color text-2xl font-black w-24 text-right bg-transparent border-b border-transparent focus:border-pink-200 outline-none"
                            id="actual-paid" oninput="updateCalculations()" step="0.01" type="number" value="467.00" />
                    </div>
                </div>
            </div>
            <button
                class="brand-bg w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg shadow-pink-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                onclick="processPayment(this)" style="background-color: #F1A3B8;">
                <span>确认支付 ¥</span>
                <span id="btn-pay-amount">467.00</span>
            </button>
            <p class="text-center text-[10px] text-gray-300 mt-4 italic">当前结算日期: 2026年04月16日</p>
        </footer>
    </div>
    <script>
        const CONFIG = {
            productAmount: 560.00,
            discountedAmount: 512.00,
            deductions: [
                { name: '金额卡-产品卡（白金卡）', amount: 20.00 },
                { name: '金额卡-产品卡（黄金卡）', amount: 15.00 },
                { name: '有限卡-客户定制权益', amount: 10.00 }
            ],
            historyArrearsMax: 128.50,
            currentDate: '2026年04月16日'
        };

        // 计算衍生属性
        CONFIG.totalDeduction = CONFIG.deductions.reduce((sum, d) => sum + d.amount, 0);
        CONFIG.baseOrderAmount = CONFIG.discountedAmount - CONFIG.totalDeduction;

        let selectedMethods = new Set();
        const methodNames = {
            'cash': '现金支付',
            'wechat': '微信支付',
            'alipay': '支付宝',
            'pos': '银行卡POS',
            'transaction': '银行卡转账',
            'merchant': '线上支付',
            'third_party': '美团/点评',
            'douyin': '抖音支付',
            'balance': '钱包',
            'store_settlement': '部门结算',
            'cloud': '云店支付'
        };

        function renderDeductionDetails() {
            const container = document.getElementById('deduction-details-container');
            if (!container) return;

            let html = `
            <div class="bg-white/50 rounded-lg overflow-hidden border border-gray-100">
                <div class="grid grid-cols-2 bg-gray-100/50 px-3 py-1.5 text-sm text-gray-400 font-medium">
                    <span>抵扣明细</span>
                </div>
                <div class="divide-y divide-gray-50">
        `;

            CONFIG.deductions.forEach(d => {
                html += `
                <div class="grid grid-cols-2 px-3 py-1.5 text-sm">
                    <span class="text-gray-500">${d.name}</span>
                    <span class="brand-color font-bold text-right"> - ¥${d.amount.toFixed(2)}</span>
                </div>
            `;
            });

            html += `
                </div>
            </div>
        `;

            container.innerHTML = html;

            // 同步 UI 上的基础金额
            document.getElementById('display-product-amount').innerText = `¥${CONFIG.productAmount.toFixed(2)}`;
            document.getElementById('display-discounted-amount').innerText = `¥${CONFIG.discountedAmount.toFixed(2)}`;
            document.getElementById('display-total-deduction').innerText = `-¥${CONFIG.totalDeduction.toFixed(2)}`;
            document.getElementById('display-base-payable').innerText = `¥${CONFIG.baseOrderAmount.toFixed(2)}`;

            // 同步主实付金额输入框初始值
            const actualPaidInput = document.getElementById('actual-paid');
            if (actualPaidInput) {
                actualPaidInput.value = CONFIG.baseOrderAmount.toFixed(2);
            }
        }

        function toggleArrearsSection() {
            const checkbox = document.getElementById('combine-payment');
            const container = document.getElementById('repay-input-container');
            if (checkbox.checked) {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
            updateCalculations();
        }

        function togglePayment(type, element) {
        // 单选模式：先清空所有选择
        selectedMethods.forEach(method => {
            const prevElement = document.querySelector(`.payment-item[onclick="togglePayment('${method}', this)"]`);
            if (prevElement) {
                prevElement.classList.remove('selected', 'border-pink-200', 'bg-pink-50/10');
                prevElement.classList.add('border-gray-100', 'bg-white');
            }
        });
        
        // 清空集合并添加当前选择
        selectedMethods.clear();
        selectedMethods.add(type);
        
        // 更新当前元素样式
        element.classList.add('selected', 'border-pink-200', 'bg-pink-50/10');
        element.classList.remove('border-gray-100', 'bg-white');

        const selectedNames = Array.from(selectedMethods).map(m => methodNames[m]).join(', ');
        document.getElementById('selected-methods-tip').innerText = `当前已选: ${selectedNames || '无'}`;
        
        rebuildAllocationInputs();
        updateCalculations();
    }

        function rebuildAllocationInputs() {
        const container = document.getElementById('method-inputs-container');
        const currentTotal = parseFloat(document.getElementById('actual-paid').value) || 0;
        
        // 记录现有的值，以便重建后恢复
        const existingValues = {};
        container.querySelectorAll('input').forEach(inp => {
            existingValues[inp.dataset.method] = inp.value;
        });

        container.innerHTML = '';
        
        const selectedArray = Array.from(selectedMethods);
        
        selectedArray.forEach((method, index) => {
            const div = document.createElement('div');
            div.className = "flex items-center justify-between bg-white border border-gray-100 rounded-xl p-3 shadow-sm";
            
            // 如果只有一个支付方式，默认填入总额，否则尝试恢复旧值或平分
            let val = existingValues[method] || "0.00";
            if (selectedArray.length === 1) {
                val = currentTotal.toFixed(2);
            }
            // 线上支付默认不低于60元
            if (method === 'merchant') {
                const amount = parseFloat(val) || 0;
                if (amount < 60) {
                    val = "60.00";
                }
            }

            let html = `
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-gray-600">${methodNames[method]}</span>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <div class="flex items-center gap-1 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100 focus-within:border-pink-200 transition-all">
                        <span class="text-xs text-gray-400">¥</span>
                        <input type="number" step="0.01" value="${val}" data-method="${method}"
                            oninput="handleMethodAmountInput(this)"
                            class="bg-transparent text-sm font-bold text-gray-800 w-24 outline-none text-right">
                    </div>
            `;

            // 添加线上支付的提示文案
            if (method === 'merchant') {
                html += `
                    <p class="text-[10px] text-gray-500 mt-1">
                        含机器人项目 <span class="brand-color font-bold text-sm">¥60</span> 元，实付金额不允许低于60元
                    </p>
                `;
            }

            html += `
                </div>
            `;

            div.innerHTML = html;
            container.appendChild(div);
        });
    }

        function handleMethodAmountInput(input) {
        const totalPayable = CONFIG.baseOrderAmount + (document.getElementById('combine-payment').checked ? (parseFloat(document.getElementById('repay-amount').value) || 0) : 0);
        
        let sum = 0;
        const inputs = document.querySelectorAll('#method-inputs-container input');
        inputs.forEach(inp => {
            sum += parseFloat(inp.value) || 0;
        });

        // 验证线上支付金额不低于60元
        if (input.dataset.method === 'merchant') {
            const amount = parseFloat(input.value) || 0;
            if (amount < 60) {
                input.value = '60.00';
                sum = sum - amount + 60;
                // 显示错误提示
                document.getElementById('allocation-error').classList.remove('hidden');
                document.getElementById('allocation-error').innerText = '线上支付金额不允许低于60元！';
            } else if (sum <= totalPayable) {
                document.getElementById('allocation-error').classList.add('hidden');
            }
        }

        // 限制总额不可大于应付总额
        if (sum > totalPayable) {
            document.getElementById('allocation-error').classList.remove('hidden');
            document.getElementById('allocation-error').innerText = '实付总额不能超过应付总额！';
            // 如果超出，扣除当前输入多出的部分以维持平衡（简单处理：强制纠正当前输入）
            const otherSum = sum - (parseFloat(input.value) || 0);
            const allowed = Math.max(0, totalPayable - otherSum);
            // 确保线上支付金额不低于60元
            if (input.dataset.method === 'merchant') {
                input.value = Math.max(60, allowed).toFixed(2);
            } else {
                input.value = allowed.toFixed(2);
            }
            sum = otherSum + parseFloat(input.value) || 0;
        }

        // 更新主实付金额
        const actualPaidInput = document.getElementById('actual-paid');
        actualPaidInput.value = sum.toFixed(2);
        
        updateCalculations(true); // true表示不重置分配输入
    }

        function updateCalculations(skipAllocationSync = false) {
            // 由于历史欠款区域已隐藏，设置repayAmount为0
            const repayAmount = 0;

            const totalPayable = CONFIG.baseOrderAmount + repayAmount;
            document.getElementById('total-payable-display').innerText = `¥${totalPayable.toFixed(2)}`;

            const actualPaidInput = document.getElementById('actual-paid');
            let actualPaid = parseFloat(actualPaidInput.value) || 0;

            // 限制主实付金额不可大于总支付金额
            if (actualPaid > totalPayable) {
                actualPaid = totalPayable;
                actualPaidInput.value = actualPaid.toFixed(2);
            }

            // 计算新产生的欠款
            const newArrears = Math.max(0, totalPayable - actualPaid);
            document.getElementById('new-arrears-amount').innerText = `¥${newArrears.toFixed(2)}`;
            document.getElementById('btn-pay-amount').innerText = actualPaid.toFixed(2);

            // 更新欠款区域的样式
            const arrearsSection = document.getElementById('new-arrears-section');
            if (newArrears > 0) {
                arrearsSection.classList.replace('bg-green-50/40', 'bg-red-50/40');
                arrearsSection.classList.replace('border-green-100', 'border-red-100');
            } else {
                arrearsSection.classList.replace('bg-red-50/40', 'bg-green-50/40');
                arrearsSection.classList.replace('border-red-100', 'border-green-100');
            }
        }

        function processPayment(btn) {
            if (selectedMethods.size === 0) {
                alert('请至少选择一种支付方式');
                return;
            }

            const actualPaid = parseFloat(document.getElementById('actual-paid').value) || 0;
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<iconify-icon icon="line-md:loading-twotone-loop" class="text-2xl"></iconify-icon><span>支付请求中...</span>';

            setTimeout(() => {
                // 由于支付金额分配区域已隐藏，直接使用实付金额作为所有选中支付方式的金额
                const methods = Array.from(selectedMethods).map(m => `${methodNames[m]}:¥${actualPaid.toFixed(2)}`).join('\n');
                alert(`支付成功！\n实付总额：¥${actualPaid.toFixed(2)}\n明细：\n${methods}\n日期：${CONFIG.currentDate}`);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        }

        window.onload = () => {
            renderDeductionDetails();
            rebuildAllocationInputs();
            updateCalculations();
        };
    </script>
</body>
