<h3 class="font-bold text-gray-800">修改支付方式</h3>
<button class="text-gray-400 hover:text-gray-600" onclick="toggleModal('edit-modal', false)"><iconify-icon class="text-xl" icon="lucide:x"></iconify-icon></button>
</div>
<div class="p-6">
<div class="mb-6">
<label class="block text-sm font-medium text-gray-700 mb-2">支付方式名称</label>
<input class="w-full h-10 px-4 border border-gray-300 rounded focus:outline-none focus:border-[#e6007e] text-sm" id="edit-name-input" type="text"/>
</div>
<div class="flex justify-end space-x-3">

<!-- 弹窗：禁用/启用二次确认 -->
<div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden" id="confirm-modal">
<div class="bg-white rounded-lg w-[420px] overflow-hidden p-8 shadow-xl">
<div class="flex items-start mb-6">
<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 mr-4" id="confirm-icon-box">
<iconify-icon class="text-xl" icon="lucide:alert-triangle" id="confirm-icon"></iconify-icon>
</div>
<div>
<h3 class="text-lg font-bold text-gray-800 mb-2" id="confirm-title">确认禁用微信吗？</h3>
<p class="text-sm text-gray-500 leading-relaxed" id="confirm-desc">禁用后将无法使用该方式进行支付，不影响已经产生的订单记录。</p>
</div>
</div>
<div class="flex justify-end space-x-3">
<button class="px-6 py-2 rounded border border-gray-300 text-sm font-medium text-gray-600" onclick="toggleModal('confirm-modal', false)">取消</button>
<button class="px-6 py-2 rounded btn-pink text-sm font-medium" id="confirm-action-btn">确认</button>
</div>

<script>
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        let editOriginalName = '';
        
        function openEditModal(name) {
            editOriginalName = name;
            document.getElementById('edit-name-input').value = name;
            toggleModal('edit-modal', true);
        }
        
        function savePaymentMethod() {
            const newName = document.getElementById('edit-name-input').value.trim();
            
            if (!newName) {
                alert('请输入支付方式名称');
                return;
            }
            
            // 获取所有支付方式名称（排除正在编辑的这一条）
            const existingMethods = Array.from(document.querySelectorAll('tbody tr')).map(row => {
                const nameEl = row.querySelector('td:nth-child(1) span');
                return nameEl ? nameEl.textContent : '';
            }).filter(name => name !== editOriginalName);
            
            // 检查新名称是否与其他支付方式重名
            if (existingMethods.includes(newName)) {
                alert('该支付方式名称已存在，请使用其他名称');
                return;
            }
            
            // 更新列表数据
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const methodName = row.querySelector('td:nth-child(1) span').textContent;
                if (methodName === editOriginalName) {
                    row.querySelector('td:nth-child(1) span').textContent = newName;
                    // 更新操作按钮中的名称
                    const actionCell = row.querySelector('td:nth-child(3)');
                    const statusText = row.querySelector('td:nth-child(2) span').textContent;
                    const actionType = statusText === '启用' ? '禁用' : '启用';
                    actionCell.innerHTML = `
                        <button class="action-red text-sm font-medium mr-4" onclick="openEditModal('${newName}')">修改</button>
                        <button class="action-red text-sm font-medium" onclick="openConfirmModal('${newName}', '${actionType}')">${actionType}</button>
                    `;
                }
            });
            
            toggleModal('edit-modal', false);
            alert('支付方式修改成功');
        }

        function addPaymentMethod() {
            const nameInput = document.getElementById('add-name-input');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert('请输入支付方式名称');
                return;
            }
            
            // 检查是否与已存在的支付方式重名
            const existingMethods = Array.from(document.querySelectorAll('tbody tr td:nth-child(1) span')).map(el => el.textContent);
            if (existingMethods.includes(name)) {
                alert('该支付方式名称已存在，请使用其他名称');
                return;
            }
            
            // 添加新的支付方式到列表
            const tbody = document.querySelector('tbody');
            const newRow = document.createElement('tr');
            newRow.className = 'hover:bg-gray-50 transition-colors';
            newRow.innerHTML = `
                <td class="py-5">
                    <span class="text-gray-800 font-medium">${name}</span>
                </td>
                <td class="py-5">
                    <span class="status-enabled px-3 py-1 rounded-full text-xs font-medium">启用</span>
                </td>
                <td class="py-5 text-right pr-8">
                    <button class="action-red text-sm font-medium mr-4" onclick="openEditModal('${name}')">修改</button>
                    <button class="action-red text-sm font-medium" onclick="openConfirmModal('${name}', '禁用')">禁用</button>
                </td>
            `;
            
            tbody.appendChild(newRow);
            
            // 关闭弹窗并重置输入
            toggleModal('add-modal', false);
            nameInput.value = '';
            
            alert('支付方式添加成功');
        }

        function openConfirmModal(name, action) {
            const titleEl = document.getElementById('confirm-title');
            const descEl = document.getElementById('confirm-desc');
            const iconBox = document.getElementById('confirm-icon-box');
            const icon = document.getElementById('confirm-icon');
            const btn = document.getElementById('confirm-action-btn');

            titleEl.innerText = `确认${action}${name}吗？`;
            
            if (action === '禁用') {
                descEl.innerText = '禁用后将无法使用该方式进行支付，不影响已经产生的订单记录。';
                iconBox.className = 'w-10 h-10 rounded-full flex items-center justify-center shrink-0 mr-4 bg-red-100 text-red-500';
                icon.setAttribute('icon', 'lucide:alert-triangle');
                btn.className = 'px-6 py-2 rounded bg-red-500 text-white text-sm font-medium hover:bg-red-600';
            } else {
                descEl.innerText = '启用后，该支付方式将在收银结算界面重新对客户开放。';
                iconBox.className = 'w-10 h-10 rounded-full flex items-center justify-center shrink-0 mr-4 bg-green-100 text-green-500';
                icon.setAttribute('icon', 'lucide:check-circle');
                btn.className = 'px-6 py-2 rounded bg-green-500 text-white text-sm font-medium hover:bg-green-600';
            }

            toggleModal('confirm-modal', true);
            btn.onclick = () => {
                // 更新列表数据
                const rows = document.querySelectorAll('tbody tr');
                rows.forEach(row => {
                    const methodName = row.querySelector('td:nth-child(1) span').textContent;
                    if (methodName === name) {
                        const statusCell = row.querySelector('td:nth-child(2) span');
                        const actionCell = row.querySelector('td:nth-child(3)');
                        
                        if (action === '禁用') {
                            statusCell.className = 'status-disabled px-3 py-1 rounded-full text-xs font-medium';
                            statusCell.textContent = '禁用';
                            actionCell.innerHTML = `
                                <button class="action-red text-sm font-medium mr-4" onclick="openEditModal('${name}')">修改</button>
                                <button class="action-red text-sm font-medium" onclick="openConfirmModal('${name}', '启用')">启用</button>
                            `;
                        } else {
                            statusCell.className = 'status-enabled px-3 py-1 rounded-full text-xs font-medium';
                            statusCell.textContent = '启用';
                            actionCell.innerHTML = `
                                <button class="action-red text-sm font-medium mr-4" onclick="openEditModal('${name}')">修改</button>
                                <button class="action-red text-sm font-medium" onclick="openConfirmModal('${name}', '禁用')">禁用</button>
                            `;
                        }
                    }
                });
                
                toggleModal('confirm-modal', false);
                alert(`${name}已${action}`);
            };
        }
    </script>
