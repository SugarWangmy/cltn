<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>支付订单 - 移动支付</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            border-radius: 40px;
            border: 8px solid #1f2937;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        /* 隐藏滚动条 */
        .scrollable-content::-webkit-scrollbar {
            width: 0px;
        }

        .custom-checkbox:checked {
            background-color: #F1A3B8;
            border-color: #F1A3B8;
        }

        /* 开关样式 */
        .switch-checkbox {
            opacity: 0;
            z-index: 10;
        }

        .switch-checkbox:checked + .switch-label {
            background-color: #F1A3B8;
        }

        .switch-checkbox:checked + .switch-label .switch-dot {
            transform: translateX(20px);
        }

        .brand-text { color: #F1A3B8; }
        .brand-bg { background-color: #F1A3B8; }
        .brand-border { border-color: #F1A3B8; }

        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            display: none;
            font-size: 14px;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <!-- 状态栏 -->
        <div class="h-12 flex items-center justify-between px-8 pt-4 pb-2 bg-[#FDF2F5] shrink-0">
            <span class="text-sm font-bold text-[#F1A3B8]">09:41</span>
            <div class="flex space-x-2 text-[#F1A3B8]">
                <iconify-icon class="text-lg" icon="mdi:signal-cellular-3"></iconify-icon>
                <iconify-icon class="text-lg" icon="mdi:wifi"></iconify-icon>
                <iconify-icon class="text-lg" icon="mdi:battery"></iconify-icon>
            </div>
        </div>
        <!-- 顶部导航 -->
        <div class="h-14 flex items-center px-4 bg-white border-b border-gray-100 shrink-0">
            <button class="w-10 h-10 flex items-center justify-center">
                <iconify-icon class="text-2xl text-gray-700" icon="mdi:chevron-left"></iconify-icon>
            </button>
            <h1 class="flex-1 text-center text-lg font-bold mr-10">支付订单</h1>
        </div>
        <!-- 主内容区 -->
        <div class="scrollable-content">
            <!-- 支付总额展示 -->
            <div class="bg-white p-6 text-center mb-4">
                <p class="text-gray-500 text-sm mb-1">支付金额</p>
                <div class="text-3xl font-bold flex items-center justify-center text-[#F1A3B8]">
                    <span class="text-xl mr-1">¥</span>
                    <span id="display-total-payable">178.00</span>
                </div>
                <p class="text-gray-400 text-xs mt-2">本单应付 + 归还欠款</p>
            </div>
            <!-- 商品明细 -->
            <div class="bg-white px-4 py-3 mb-4">
                <div class="flex justify-between items-center py-2 text-sm">
                    <span class="text-gray-500">商品金额</span>
                    <span class="font-medium">¥ 158.00</span>
                </div>
                <div class="flex justify-between items-center py-2 text-sm">
                    <span class="text-gray-500">折后金额</span>
                    <span class="font-medium">¥ 128.00</span>
                </div>
                <div class="flex justify-between items-center py-2 text-sm">
                    <span class="text-gray-500">抵扣金额</span>
                    <span class="text-red-500">- ¥ 0.00</span>
                </div>
                <div class="border-t border-gray-50 mt-1 pt-2 flex justify-between items-center">
                    <span class="text-gray-900 font-bold">本单应付</span>
                    <span class="text-[#F1A3B8] font-bold">¥ 128.00</span>
                </div>
            </div>
            <!-- 历史欠款功能区 -->
            <div class="bg-white px-4 py-3 mb-4">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2">
                        <iconify-icon class="text-xl brand-color" icon="mdi:history"></iconify-icon>
                        <span class="font-bold text-gray-800">历史欠款</span>
                    </div>
                    <span class="text-sm font-medium text-gray-500">¥ 50.00</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                    <span class="text-gray-500" style="font-size: 14px;">归还历史欠款</span>
                    <div
                        class="relative inline-block w-11 h-6 align-middle select-none transition duration-200 ease-in">
                        <input
                            class="switch-checkbox absolute w-11 h-6 appearance-none cursor-pointer z-10"
                            id="debtToggle" type="checkbox" />
                        <label
                            class="switch-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-200"
                            for="debtToggle">
                            <span
                                class="switch-dot absolute top-0 left-0 w-6 h-6 bg-white rounded-full transition-transform duration-200 pointer-events-none shadow-sm"></span>
                        </label>
                    </div>
                </div>
                <div class="hidden mt-4 pt-4 border-t border-gray-50" id="debtInputArea">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-medium">¥</span>
                        <input
                            class="w-full bg-gray-50 rounded-xl py-3 pl-8 pr-4 text-lg font-bold brand-text focus:outline-none focus:ring-1 brand-border"
                            id="debtAmount" type="number" value="50.00" />
                    </div>
                    <p class="text-[11px] text-gray-400 mt-2">* 默认填充全部欠款，支持按需修改</p>
                </div>
            </div>
            <!-- 支付方式多选 -->
            <div class="bg-white px-4 py-3">
                <h2 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    支付方式 <span class="ml-2 font-normal text-xs text-[#F1A3B8]">(最多选2种)</span>
                </h2>
                <div class="space-y-1" id="payment-methods-list">
                    <!-- 微信支付 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="wechat" />
                            <iconify-icon class="text-2xl" icon="logos:wechat-pay"></iconify-icon>
                            <span class="text-gray-700 font-medium">微信支付</span>
                        </div>
                    </label>
                    <!-- 支付宝 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="alipay" />
                            <iconify-icon class="text-2xl" icon="logos:alipay"></iconify-icon>
                            <span class="text-gray-700 font-medium">支付宝</span>
                        </div>
                    </label>
                    <!-- 现金支付 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="cash" />
                            <iconify-icon class="text-2xl text-green-600" icon="mdi:cash-multiple"></iconify-icon>
                            <span class="text-gray-700 font-medium">现金支付</span>
                        </div>
                    </label>
                    <!-- 银联支付 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox"
                                value="unionpay" />
                            <iconify-icon class="text-xl" icon="logos:unionpay"></iconify-icon>
                            <span class="text-gray-700 font-medium">银联卡支付</span>
                        </div>
                    </label>
                    <!-- 美团/点评 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="meituan" />
                            <iconify-icon class="text-2xl text-yellow-500" icon="simple-icons:meituan"></iconify-icon>
                            <span class="text-gray-700 font-medium">美团/大众点评</span>
                        </div>
                    </label>
                    <!-- 抖音支付 -->
                    <label class="flex items-center justify-between py-3 border-b border-gray-50 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="douyin" />
                            <iconify-icon class="text-xl" icon="logos:tiktok-icon"></iconify-icon>
                            <span class="text-gray-700 font-medium">抖音支付</span>
                        </div>
                    </label>
                    <!-- 线上支付 -->
                    <label class="flex items-center justify-between py-3 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <input class="w-5 h-5 rounded border-gray-300 text-[#F1A3B8] focus:ring-[#F1A3B8]"
                                name="pay-method" onchange="handleMethodChange(this)" type="checkbox" value="online"
                                id="online-payment" />
                            <iconify-icon class="text-xl" icon="mdi:credit-card-outline"></iconify-icon>
                            <span class="text-gray-700 font-medium">线上支付</span>
                        </div>
                    </label>
                </div>
            </div>
            <!-- 集中分配区域 -->
            <div class="mt-4 px-4 hidden" id="allocation-area">
                <h2 class="text-sm font-bold text-gray-700 mb-3">金额分配</h2>
                <div class="space-y-3" id="allocation-inputs">
                    <!-- 动态生成的输入框将在这里 -->
                </div>
            </div>
        </div>
        <!-- 确认支付按钮容器 -->
        <div class="absolute bottom-0 left-0 right-0 p-6 bg-white border-t border-gray-100">
            <button
                class="w-full bg-[#F1A3B8] text-white font-bold py-4 rounded-2xl shadow-lg shadow-[#F1A3B8]/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2"
                id="confirm-pay">
                <span>确认支付</span>
                <span class="text-lg font-black">¥<span id="btn-amount">178.00</span></span>
            </button>
        </div>
        <!-- 提示框 -->
        <div class="toast" id="toast">最多只能选择2个支付方式</div>
        <div class="toast bg-red-600" id="error-toast">总额不符，请核对</div>
    </div>
    <script>
        const STATE = {
            baseAmount: 128.00,
            debtTotal: 50.00,
            debtAmount: 50.00,
            isReturningDebt: false,
            totalPayable: 178.00,
            selectedMethods: [], // {id, name, amount}
            hasRobotProject: true, // 本单含机器人项目
            robotAmount: 60.00, // 机器人项目金额
            methodLabels: {
                'wechat': '微信支付',
                'alipay': '支付宝',
                'cash': '现金支付',
                'unionpay': '银联卡支付',
                'meituan': '美团/大众点评',
                'douyin': '抖音支付',
                'online': '线上支付' // 线上支付方式
            }
        };

        const debtInput = document.getElementById('debtAmount');
        const debtInputContainer = document.getElementById('debtInputArea');
        const debtToggle = document.getElementById('debtToggle');
        const displayTotal = document.getElementById('display-total-payable');
        const allocationArea = document.getElementById('allocation-area');
        const allocationInputs = document.getElementById('allocation-inputs');
        const toast = document.getElementById('toast');
        const errorToast = document.getElementById('error-toast');
        const confirmBtn = document.getElementById('confirm-pay');

        // 初始化
        function init() {
            updateTotal();
            debtInput.addEventListener('input', (e) => {
                let val = parseFloat(e.target.value) || 0;
                // 限制归还金额不能超过欠款总额
                if (val > STATE.debtTotal) {
                    val = STATE.debtTotal;
                    e.target.value = val.toFixed(2);
                }
                STATE.debtAmount = val;
                updateTotal();
                syncAllocationsFromTotal();
            });

            // 添加欠款归还开关的事件监听器
            if (debtToggle) {
                debtToggle.addEventListener('change', (e) => {
                    toggleDebt(e.target.checked);
                });
                // 初始化开关状态
                debtToggle.checked = STATE.isReturningDebt;
            }

            confirmBtn.addEventListener('click', validateAndSubmit);

            // 当本单含机器人项目时，默认选中线上支付
            if (STATE.hasRobotProject) {
                const onlineCheckbox = document.getElementById('online-payment');
                if (onlineCheckbox && !onlineCheckbox.checked) {
                    onlineCheckbox.checked = true;
                    handleMethodChange(onlineCheckbox);
                }
            }
        }

        // 切换欠款归还开关
        function toggleDebt(checked) {
            STATE.isReturningDebt = checked;
            if (checked) {
                debtInputContainer.classList.remove('hidden');
                STATE.debtAmount = STATE.debtTotal;
                debtInput.value = STATE.debtTotal.toFixed(2);
            } else {
                debtInputContainer.classList.add('hidden');
                STATE.debtAmount = 0;
            }
            updateTotal();
            syncAllocationsFromTotal();
        }

        // 更新总应付金额
        function updateTotal() {
            const returnAmount = STATE.isReturningDebt ? STATE.debtAmount : 0;
            STATE.totalPayable = STATE.baseAmount + returnAmount;
            displayTotal.innerText = STATE.totalPayable.toFixed(2);

            // 更新确认支付按钮中的金额
            const btnAmount = document.getElementById('btn-amount');
            if (btnAmount) {
                btnAmount.innerText = STATE.totalPayable.toFixed(2);
            }

            // 更新显示在支付总额下的提示文字 (本单应付 + 归还欠款)
            const subText = document.querySelector('.phone-container .bg-white.p-6.text-center p.text-gray-400');
            if (subText) {
                subText.innerText = STATE.isReturningDebt ? '本单应付 + 归还欠款' : '本单应付';
            }
        }

        // 处理支付方式选择
        function handleMethodChange(checkbox) {
            const val = checkbox.value;
            const name = STATE.methodLabels[val];

            if (checkbox.checked) {
                if (STATE.selectedMethods.length >= 2) {
                    checkbox.checked = false;
                    showToast('最多只能选择2个支付方式');
                    return;
                }
                STATE.selectedMethods.push({ id: val, name: name, amount: 0 });
            } else {
                // 当存在机器人项目时，不允许取消勾选“线上支付”
                if (STATE.hasRobotProject && val === 'online') {
                    checkbox.checked = true;
                    showToast('含机器人项目必须选择线上支付');
                    return;
                }
                STATE.selectedMethods = STATE.selectedMethods.filter(m => m.id !== val);
            }

            renderAllocations();
        }

        // 渲染分配区域
        function renderAllocations() {
            if (STATE.selectedMethods.length === 0) {
                allocationArea.classList.add('hidden');
                return;
            }

            allocationArea.classList.remove('hidden');
            allocationInputs.innerHTML = '';

            // 首位补齐逻辑
            if (STATE.selectedMethods.length === 1) {
                STATE.selectedMethods[0].amount = STATE.totalPayable;
            } else if (STATE.selectedMethods.length === 2) {
                // 刚选中第二个时，保持第一个为总额，第二个为0
                // 只有在手动输入或者重新渲染时处理
                if (STATE.selectedMethods[1].amount === 0) {
                    // 如果是新选中的，不自动扣除第一个，等待用户输入
                    // 或者按照要求：第一个选中的仍然显示总额，第二个空
                }
            }

            STATE.selectedMethods.forEach((method, index) => {
                const isReadOnly = STATE.selectedMethods.length === 1;

                // 当本单含机器人项目时，线上支付的金额不允许低于机器人项目金额60元
                if (STATE.hasRobotProject && method.id === 'online') {
                    if (method.amount < STATE.robotAmount) {
                        method.amount = STATE.robotAmount;
                    }
                }

                const div = document.createElement('div');
                div.className = 'bg-gray-50 border border-gray-200 rounded-xl p-3 transition-all';
                div.innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span class="text-xs font-bold text-[#F1A3B8] bg-[#FDF2F5] px-2 py-1 rounded">${method.name}</span>
                        ${STATE.hasRobotProject && method.id === 'online' ? '<span class="text-xs text-orange-500 ml-1">(≥¥60)</span>' : ''}
                    </div>
                    <div class="flex items-center">
                        <span class="text-gray-400 mr-1">¥</span>
                        <input type="number" 
                            class="bg-transparent text-right font-bold w-24 outline-none ${isReadOnly ? 'text-gray-400' : 'text-gray-900'}" 
                            value="${method.amount === 0 && index === 1 ? '' : method.amount.toFixed(2)}" 
                            placeholder="0.00"
                            ${isReadOnly ? 'readonly' : ''}
                            oninput="updateAllocationAmount('${method.id}', this.value)">
                    </div>
                </div>
                ${STATE.hasRobotProject && method.id === 'online' ? `
                <div class="mt-2 text-xs text-orange-600 bg-orange-50 p-2 rounded-lg">
                    含机器人项目￥60元，实付金额不允许低于60元
                </div>
                ` : ''}
            `;
                allocationInputs.appendChild(div);
            });
        }

        // 联动逻辑：调整一个金额，自动更新另一个
        function updateAllocationAmount(id, value) {
            let val = parseFloat(value) || 0;

            // 当本单含机器人项目时，线上支付的金额不允许低于机器人项目金额60元
            if (STATE.hasRobotProject && id === 'online') {
                if (val < STATE.robotAmount) {
                    val = STATE.robotAmount;
                    // 更新输入框的值
                    const inputs = allocationInputs.querySelectorAll('input');
                    const currentIndex = STATE.selectedMethods.findIndex(m => m.id === id);
                    if (inputs[currentIndex]) {
                        inputs[currentIndex].value = val.toFixed(2);
                    }
                }
            }

            // 当输入的支付金额超过总支付金额时，自动还原到总支付金额
            if (val > STATE.totalPayable) {
                val = STATE.totalPayable;
                // 更新输入框的值
                const inputs = allocationInputs.querySelectorAll('input');
                const currentIndex = STATE.selectedMethods.findIndex(m => m.id === id);
                if (inputs[currentIndex]) {
                    inputs[currentIndex].value = val.toFixed(2);
                }
            }

            // 更新当前选中的金额
            const target = STATE.selectedMethods.find(m => m.id === id);
            if (target) target.amount = val;

            // 如果有两个支付方式，联动计算另一个
            if (STATE.selectedMethods.length === 2) {
                const other = STATE.selectedMethods.find(m => m.id !== id);
                other.amount = Math.max(0, STATE.totalPayable - val);

                // 当本单含机器人项目时，确保线上支付的金额不允许低于机器人项目金额60元
                if (STATE.hasRobotProject && other.id === 'online' && other.amount < STATE.robotAmount) {
                    other.amount = STATE.robotAmount;
                    target.amount = Math.max(0, STATE.totalPayable - other.amount);

                    // 更新输入框的值
                    const inputs = allocationInputs.querySelectorAll('input');
                    const targetIndex = STATE.selectedMethods.findIndex(m => m.id === id);
                    if (inputs[targetIndex]) {
                        inputs[targetIndex].value = target.amount.toFixed(2);
                    }
                }

                // 查找另一个输入框并更新视图，但不重新渲染整个区域以防丢失焦点
                const inputs = allocationInputs.querySelectorAll('input');
                const otherIndex = STATE.selectedMethods.indexOf(other);
                if (inputs[otherIndex]) {
                    inputs[otherIndex].value = other.amount.toFixed(2);
                }
            }
        }

        // 当总金额变化时（欠款修改），同步更新分配区
        function syncAllocationsFromTotal() {
            if (STATE.selectedMethods.length === 1) {
                STATE.selectedMethods[0].amount = STATE.totalPayable;
                const input = allocationInputs.querySelector('input');
                if (input) input.value = STATE.totalPayable.toFixed(2);
            } else if (STATE.selectedMethods.length === 2) {
                // 双支付方式下，如果总额变了，通常按比例或保持一个不变？
                // 这里采用：保持第一个不变，更新第二个差值（或反之）
                // 简单处理：重新触发一次第一个值的联动
                const first = STATE.selectedMethods[0];
                updateAllocationAmount(first.id, first.amount);
            }
        }

        // 校验并提交
        function validateAndSubmit() {
            if (STATE.selectedMethods.length === 0) {
                showToast('请至少选择一种支付方式');
                return;
            }

            const sum = STATE.selectedMethods.reduce((acc, m) => acc + m.amount, 0);
            // 允许微小的浮点数误差
            if (Math.abs(sum - STATE.totalPayable) > 0.01) {
                showErrorToast(`金额不符！已分配 ¥${sum.toFixed(2)}，应付 ¥${STATE.totalPayable.toFixed(2)}`);
                return;
            }

            // 模拟成功
            confirmBtn.innerHTML = '<iconify-icon icon="line-md:loading-twotone-loop" class="text-2xl"></iconify-icon>';
            confirmBtn.classList.add('opacity-80');
            setTimeout(() => {
                alert('支付成功！\n流水号：PAY20260416' + Math.floor(Math.random() * 1000000));
                location.reload();
            }, 1500);
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function showErrorToast(msg) {
            errorToast.innerText = msg;
            errorToast.style.display = 'block';
            setTimeout(() => errorToast.style.display = 'none', 3000);
        }

        init();
    </script>
</body>

</html>
